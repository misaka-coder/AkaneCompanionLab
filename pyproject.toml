[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
  ".venv",
  "local_research",
  "runtime_logs",
  "users_data",
]

[tool.ruff.lint]
# Start with correctness-focused rules so the Alpha CI can protect new changes
# without forcing a repository-wide style rewrite.
select = ["E9", "F63", "F7", "F82"]
