name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-alpha:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Python correctness lint
        run: python -m ruff check .

      - name: Python tests
        run: python -m unittest discover tests

      - name: Check Windows bootstrap contract
        shell: pwsh
        run: ./scripts/bootstrap_akane_windows.ps1 -CheckOnly -Mode Web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop_pet_next/package-lock.json

      - name: Install desktop dependencies
        run: npm --prefix desktop_pet_next ci

      - name: Verify control center and Vite build
        run: npm --prefix desktop_pet_next run verify:control-center

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Tauri Rust crate
        run: cargo check --manifest-path desktop_pet_next/src-tauri/Cargo.toml

      - name: Export and audit public Alpha snapshot
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP "AkaneCompanionLab-public-alpha"
          ./scripts/export_public_alpha.ps1 -OutputPath $output
          ./scripts/audit_public_release.ps1 -ReleaseRoot $output

      - name: Diff hygiene
        shell: pwsh
        run: git diff --check
